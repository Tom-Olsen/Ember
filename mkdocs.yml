site_name: Ember Engine Docs
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Visualizing the Docs: visualizing.md
  - Architecture:
      - GUI, Editor, and Input Routing: architecture/gui-editor-engine.md
      - Window Events: architecture/window-events.md
  - Decisions:
      - GUI Input Capture: adr/0001-gui-editor-input-routing.md